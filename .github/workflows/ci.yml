---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core ansible-lint flake8
      - run: ansible-lint --profile production
      - run: flake8 plugins/ --max-line-length=120 --ignore=E402,W503

  sanity:
    name: Sanity (ansible-core ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible: ["2.16", "2.17", "2.18"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/newrelic
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ansible-core~=${{ matrix.ansible }}.0"
      - working-directory: ansible_collections/stevefulme1/newrelic
        run: ansible-test sanity -v --color yes

  unit:
    name: Unit Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install pytest requests
      - run: pytest tests/unit/ -v
