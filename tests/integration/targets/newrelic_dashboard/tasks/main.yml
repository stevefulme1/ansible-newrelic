---
# Integration tests for stevefulme1.newrelic.newrelic_dashboard
# These tests require valid credentials configured in integration_config.yml

- name: Create dashboard (check_mode)
  stevefulme1.newrelic.newrelic_dashboard:
    host: "{{ newrelic_host }}"
    api_key: "{{ newrelic_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    account_id: "{{ newrelic_account_id }}"
    permissions: PUBLIC_READ_WRITE
    pages:
      - name: Overview
        widgets:
          - title: Throughput
            configuration:
              area:
                nrqlQueries:
                  - query: "SELECT count(*) FROM Transaction"
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed
      - check_result.diff is defined

- name: Create dashboard
  stevefulme1.newrelic.newrelic_dashboard:
    host: "{{ newrelic_host }}"
    api_key: "{{ newrelic_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    account_id: "{{ newrelic_account_id }}"
    permissions: PUBLIC_READ_WRITE
    pages:
      - name: Overview
        widgets:
          - title: Throughput
            configuration:
              area:
                nrqlQueries:
                  - query: "SELECT count(*) FROM Transaction"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: create_result

- name: Verify dashboard was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.dashboard is defined
      - create_result.dashboard.guid is defined

- name: Create dashboard again (idempotency)
  stevefulme1.newrelic.newrelic_dashboard:
    host: "{{ newrelic_host }}"
    api_key: "{{ newrelic_api_key }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    account_id: "{{ newrelic_account_id }}"
    permissions: PUBLIC_READ_WRITE
    pages:
      - name: Overview
        widgets:
          - title: Throughput
            configuration:
              area:
                nrqlQueries:
                  - query: "SELECT count(*) FROM Transaction"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: idem_result

- name: Verify idempotent create returns changed=false
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete dashboard (check_mode)
  stevefulme1.newrelic.newrelic_dashboard:
    host: "{{ newrelic_host }}"
    api_key: "{{ newrelic_api_key }}"
    state: absent
    dashboard_guid: "{{ create_result.dashboard.guid }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: delete_check

- name: Verify check_mode delete reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed

- name: Delete dashboard
  stevefulme1.newrelic.newrelic_dashboard:
    host: "{{ newrelic_host }}"
    api_key: "{{ newrelic_api_key }}"
    state: absent
    dashboard_guid: "{{ create_result.dashboard.guid }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_result

- name: Verify dashboard was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete dashboard again (idempotent)
  stevefulme1.newrelic.newrelic_dashboard:
    host: "{{ newrelic_host }}"
    api_key: "{{ newrelic_api_key }}"
    state: absent
    dashboard_guid: "{{ create_result.dashboard.guid }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_idem

- name: Verify idempotent delete returns changed=false
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
