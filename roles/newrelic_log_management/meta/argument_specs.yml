---
argument_specs:
  main:
    short_description: "Set up log forwarding and parsing"
    options:
      newrelic_log_management_host:
        description: Target host address
        type: str
        required: true
      newrelic_log_management_username:
        description: Authentication username
        type: str
      newrelic_log_management_password:
        description: Authentication password
        type: str
        no_log: true
      newrelic_log_management_api_key:
        description: API key for authentication
        type: str
        no_log: true
      newrelic_log_management_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      newrelic_log_management_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
