---
# tasks/main.yml for newrelic_log_management
# Set up log forwarding and parsing

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - newrelic_log_management_host is defined
    fail_msg: "newrelic_log_management_host must be defined"
    quiet: true

- name: Execute newrelic log management
  ansible.builtin.debug:
    msg: >-
      Set up log forwarding and parsing.
      Target: {{ newrelic_log_management_host }}
