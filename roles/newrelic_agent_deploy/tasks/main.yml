---
# tasks/main.yml for newrelic_agent_deploy
# Deploy and configure New Relic agents

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - newrelic_agent_deploy_host is defined
    fail_msg: "newrelic_agent_deploy_host must be defined"
    quiet: true

- name: Execute newrelic agent deploy
  ansible.builtin.debug:
    msg: >-
      Deploy and configure New Relic agents.
      Target: {{ newrelic_agent_deploy_host }}
