---
# tasks/main.yml for newrelic_infra_monitoring
# Set up infrastructure monitoring

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - newrelic_infra_monitoring_host is defined
    fail_msg: "newrelic_infra_monitoring_host must be defined"
    quiet: true

- name: Execute newrelic infra monitoring
  ansible.builtin.debug:
    msg: >-
      Set up infrastructure monitoring.
      Target: {{ newrelic_infra_monitoring_host }}
