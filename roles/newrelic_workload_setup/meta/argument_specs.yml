---
argument_specs:
  main:
    short_description: "Define and configure workloads"
    options:
      newrelic_workload_setup_host:
        description: Target host address
        type: str
        required: true
      newrelic_workload_setup_username:
        description: Authentication username
        type: str
      newrelic_workload_setup_password:
        description: Authentication password
        type: str
        no_log: true
      newrelic_workload_setup_api_key:
        description: API key for authentication
        type: str
        no_log: true
      newrelic_workload_setup_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      newrelic_workload_setup_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
