---
# tasks/main.yml for newrelic_apm_setup
# Configure APM instrumentation

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - newrelic_apm_setup_host is defined
    fail_msg: "newrelic_apm_setup_host must be defined"
    quiet: true

- name: Execute newrelic apm setup
  ansible.builtin.debug:
    msg: >-
      Configure APM instrumentation.
      Target: {{ newrelic_apm_setup_host }}
